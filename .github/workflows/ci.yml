name: CI

# Filet de sécurité minimal pour un projet no-build :
# vérifie la syntaxe (scripts classiques ET modules ES) puis lance les tests.
# Objectif : bloquer avant merge les régressions du type « écran blanc »
# (erreur de syntaxe dans un module ES qui casse tout le portail ops).
# NB : le check syntaxe passe par scripts/check-syntax.mjs qui analyse
# ops/src EN TANT QUE modules — un simple `node --check *.js` ne le détecte pas.

on:
  push:
    branches: [Cursor, main, master]
  pull_request:
    branches: [Cursor, main, master]

jobs:
  check:
    name: Syntaxe & tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Aucune dépendance à installer : les scripts n'utilisent que Node natif.
      - name: Vérification syntaxe (scripts classiques + modules ES)
        run: npm run check:js

      - name: Tests (privilèges + assemblage API)
        run: npm test
