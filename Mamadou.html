<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mamadou</title>
  <meta name="description" content="My name is Mamadou">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,800;1,9..40,400&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #0c1222;
      --bg-card: rgba(255, 255, 255, 0.06);
      --accent: #14b8a6;
      --accent-glow: rgba(20, 184, 166, 0.35);
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --border: rgba(255, 255, 255, 0.1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: "DM Sans", system-ui, sans-serif;
      color: var(--text);
      background: var(--bg-deep);
      overflow-x: hidden;
    }

    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(20, 184, 166, 0.18), transparent 55%),
        radial-gradient(ellipse 60% 50% at 85% 80%, rgba(99, 102, 241, 0.14), transparent 50%),
        radial-gradient(ellipse 40% 30% at 50% 50%, rgba(20, 184, 166, 0.06), transparent 70%),
        var(--bg-deep);
    }

    .grid-overlay {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 70% 70% at 50% 45%, black 20%, transparent 75%);
    }

    main {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem 1.25rem;
    }

    .card {
      width: min(520px, 100%);
      padding: clamp(2.5rem, 6vw, 3.5rem) clamp(1.75rem, 5vw, 2.75rem);
      border-radius: 28px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      backdrop-filter: blur(20px);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.04) inset,
        0 24px 80px rgba(0, 0, 0, 0.45),
        0 0 120px var(--accent-glow);
      text-align: center;
      animation: rise 0.9s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(28px) scale(0.97);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .avatar {
      width: 88px;
      height: 88px;
      margin: 0 auto 1.75rem;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-family: "Fraunces", Georgia, serif;
      font-size: 2.25rem;
      font-weight: 700;
      color: var(--bg-deep);
      background: linear-gradient(135deg, #5eead4 0%, var(--accent) 50%, #0d9488 100%);
      box-shadow: 0 12px 40px var(--accent-glow);
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 12px 40px var(--accent-glow); }
      50% { box-shadow: 0 12px 56px rgba(20, 184, 166, 0.5); }
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 1rem;
      padding: 0.35rem 0.85rem;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(20, 184, 166, 0.12);
      border: 1px solid rgba(20, 184, 166, 0.25);
    }

    h1 {
      font-family: "Fraunces", Georgia, serif;
      font-size: clamp(2rem, 6vw, 2.75rem);
      font-weight: 700;
      line-height: 1.15;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
    }

    h1 span {
      background: linear-gradient(135deg, #f8fafc 0%, #99f6e4 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .subtitle {
      font-size: 1.05rem;
      color: var(--text-muted);
      line-height: 1.6;
      max-width: 32ch;
      margin: 0 auto 2rem;
    }

    .divider {
      width: 48px;
      height: 3px;
      margin: 0 auto 1.75rem;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }

    .tagline {
      font-size: 0.9rem;
      color: var(--text-muted);
      font-style: italic;
    }

  </style>
</head>
<body>
  <div class="bg" aria-hidden="true"></div>
  <div class="grid-overlay" aria-hidden="true"></div>

  <main>
    <article class="card">
      <div class="avatar" aria-hidden="true">M</div>
      <p class="eyebrow">Welcome</p>
      <h1><span>My name is Mamadou</span></h1>
      <div class="divider" aria-hidden="true"></div>
      <p class="subtitle">Nice to meet you.</p>
      <p class="tagline">✦</p>
    </article>
  </main>
</body>
</html>
