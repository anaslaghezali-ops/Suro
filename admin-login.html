<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SURO — Connexion Admin</title>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    body {
      background: linear-gradient(135deg, #0F172A 0%, #0F766E 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .auth-container { width: 100%; max-width: 420px; }
    .auth-card {
      background: white;
      border-radius: var(--radius-lg);
      padding: 40px 32px;
      box-shadow: 0 20px 25px rgba(0, 0, 0, 0.25);
    }
    .auth-header { text-align: center; margin-bottom: 32px; }
    .auth-logo { font-size: 36px; font-weight: 800; color: var(--color-primary); margin-bottom: 4px; }
    .auth-badge {
      display: inline-block; font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--color-primary);
      background: rgba(15, 118, 110, 0.1); padding: 4px 10px; border-radius: 6px; margin-bottom: 12px;
    }
    .auth-subtitle { font-size: 14px; color: var(--color-neutral-600); }
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block; font-weight: 600; color: var(--color-neutral-900);
      margin-bottom: 8px; font-size: 14px;
    }
    .form-group input {
      width: 100%; padding: 12px 16px; border: 1px solid var(--color-neutral-200);
      border-radius: var(--radius-md); font-size: 16px; font-family: inherit;
      transition: all 200ms ease;
    }
    .form-group input:focus {
      outline: none; border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.1);
    }
    .form-group button { width: 100%; }
    .error-message {
      color: var(--color-error); font-size: 13px; margin-top: 12px; display: none; text-align: center;
    }
    .error-message.show { display: block; }
    .loading-spinner {
      display: none; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 640px) { .auth-card { padding: 32px 20px; } }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">SURO</div>
        <div class="auth-badge">Administration</div>
        <p class="auth-subtitle">Espace réservé à l'équipe SURO</p>
      </div>

      <form id="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="admin@suro.ma" required>
        </div>
        <div class="form-group">
          <label for="password">Mot de passe</label>
          <input type="password" id="password" placeholder="Votre mot de passe" required>
        </div>
        <button type="submit" class="btn btn-primary">
          <span class="loading-spinner" id="spinner"></span>
          <span id="button-text">Se connecter</span>
        </button>
        <div class="error-message" id="form-error"></div>
      </form>
    </div>
  </div>

  <script src="js/services/api.js?v=9"></script>
  <script>
    const form = document.getElementById('login-form');
    const spinner = document.getElementById('spinner');
    const buttonText = document.getElementById('button-text');
    const formError = document.getElementById('form-error');

    function showError(msg) {
      formError.textContent = msg;
      formError.classList.add('show');
      spinner.style.display = 'none';
      buttonText.textContent = 'Se connecter';
      form.querySelector('button').disabled = false;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      formError.classList.remove('show');

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      spinner.style.display = 'inline-block';
      buttonText.textContent = 'Connexion...';
      form.querySelector('button').disabled = true;

      try {
        await window.SURO_API.login(email, password);

        // Vérifie que ce compte est bien admin
        const admin = await window.SURO_API.isAdmin();
        if (!admin) {
          await window.SURO_API.logout();
          showError('Ce compte n\'a pas les droits administrateur.');
          return;
        }

        window.location.href = 'backoffice/';
      } catch (error) {
        let message = error.message || 'Erreur de connexion';
        if (/invalid login credentials/i.test(message)) {
          message = 'Email ou mot de passe incorrect';
        } else if (/email not confirmed/i.test(message)) {
          message = 'Email non confirmé';
        }
        showError(message);
      }
    });
  </script>
</body>
</html>
